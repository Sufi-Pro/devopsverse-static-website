name: Deploy Static Site on K3s

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USER }}/${{ secrets.DOCKERHUB_REPO }}:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USER }}/${{ secrets.DOCKERHUB_REPO }}:${IMAGE_TAG}

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.K3_SERVER_Host }}
          username: ${{ secrets.K3_SERVER_User }}
          key: ${{ secrets.K3_SERVER_SSHKEY }}
          port: 22
          script: |
            echo "Welcome to the server"
      
      
